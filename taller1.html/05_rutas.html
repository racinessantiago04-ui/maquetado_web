<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rutas</title>
</head>
<body>
    
<h1>Explicacion: Rutas Absolutas y Relativas</h1>

<section>
    <h2>Rutas Absolutas</h2>
    <!-- Ruta completa a un recurso en un servidor externo. La ruta absoluta es la URL completa del curso, esta no se modifica segun la ubicacion del archivo actual -->
     <p>
        Para ir a un sitio externo, como el catalogo global de repuestos, usamos la URL completa:
        <a href="https://www.catalogorepuestos.com">Catalogo Global de Repuestos</a>
     </p>

<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSmSBIKnYCSnXEpjbOjjRc7JPjE2015ofHyjg&s" alt="Imagen HTML desde un servidor externo" width="300" height="200" title="HTML 5">
</section>

<hr>

<section>
    <h2>Rutas Relativas</h2>
    <!-- Ruta que se define en relacion a la ubicacion del archivo actual. La ruta relativa se modifica segun la ubicacion del archivo actual, y se ajusta sehun la estructura de carpetas del proyecto -->
    <p>
        ir a la pagina de <a href="04_inline_inblock.html">Inline vs Block</a> 
        <!-- Funciona si hay un archivo llamado '04_inline_inblock.html' en la misma carpeta -->
     </p>

<p>
    ver foto de tecnologia <a href="img/tecnologia.jpg">Tecnologia</a>
     <!-- Funciona si hay una carpeta llamada 'img' en la misma carpeta, y dentro de esa carpeta hay un archivo llamado 'tecnologia.jpg' -->
</p>
</section>

</body>
</html>
