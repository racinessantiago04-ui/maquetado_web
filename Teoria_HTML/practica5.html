<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Teoría: Listas en HTML</title>
</head>
<body>

<!-- ===================================================== -->
<!-- 📚 TEORÍA: LISTAS DESORDENADAS EN HTML -->
<!-- ===================================================== -->

<!-- La etiqueta <ul> significa "unordered list" (lista desordenada) -->
<!-- Se usa para crear listas donde el orden no es importante -->
<!-- Los elementos dentro de la lista se marcan con viñetas (•) -->

<!-- La etiqueta <li> significa "list item" (elemento de lista) -->
<!-- Cada <li> representa un elemento dentro de la lista -->

<!-- ===================================================== -->
<!-- 🧾 ESTRUCTURA BÁSICA -->
<!-- ===================================================== -->

<!-- Una lista desordenada se construye así: -->

<ul>
    <li>Elemento 1</li>
    <li>Elemento 2</li>
    <li>Elemento 3</li>
</ul>

<!-- ===================================================== -->
<!-- 🧠 ¿PARA QUÉ SIRVE <ul>? -->
<!-- ===================================================== -->

<!-- ✔ Organizar información en forma de lista -->
<!-- ✔ Mostrar elementos sin necesidad de orden específico -->
<!-- ✔ Mejorar la claridad visual del contenido -->

<!-- ===================================================== -->
<!-- ⚠️ BUENAS PRÁCTICAS -->
<!-- ===================================================== -->

<!-- ✔ Usar <ul> cuando el orden NO importa -->
<!-- ✔ Usar <ol> cuando el orden SÍ importa (listas numeradas) -->
<!-- ✔ Siempre colocar <li> dentro de <ul> o <ol>, nunca solos -->

<!-- ===================================================== -->
<!-- 🔄 COMPARACIÓN RÁPIDA -->
<!-- ===================================================== -->

<!-- Lista desordenada (ul) → viñetas -->
<!-- Lista ordenada (ol) → números -->

<!-- Ejemplo de lista ordenada -->
<ol>
    <li>Primer paso</li>
    <li>Segundo paso</li>
    <li>Tercer paso</li>
</ol>

<!-- ===================================================== -->
<!-- ✅ RESUMEN -->
<!-- ===================================================== -->

<!-- <ul> crea una lista con viñetas -->
<!-- <li> define cada elemento de la lista -->
<!-- Se usa cuando el orden no es importante -->

<a href="/practica7.html">Volver</a>

</body>
</html>
