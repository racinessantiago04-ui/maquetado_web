<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Etiquetas de bloque y Etiquetas de linea --> <h1>Imagenes</h1>
<!-- Las imagenes se insertan en html utilizando la etiqueta img. Esta etiqueta es un elemnto vacio, lo que no tiene etiqueta de cirre. La sintaxis basica para insertar una imagen es: -->

<!-- vale la pena recordar que el atributo title proporciona un tooltip que se muestra al usuario pasa el mouse sobre la imagen -->
<img src="mysql.png" alt="Delfín" title="delfin" width="200" height="200">
<!-- Para que los lectores de pantalla puedan saber de que se trata la imagen el atributo alt (alternative text) es fundamental puesto que proporciona una descripción alternativa de la imagen para accesibilidad y como fallback si no se carga. El Texto alternativo debe ser descriptivo y conciso, y debe transmitir la informacion escencial que la imagen representa. por ejemplo "Delfín nadando en el océano" -->

<!-- self closing tags son etiquetas que se autoencierren -->

</body>
</html>
