<!DOCTYPE html>
<!-- No es una etiqueta HTML como tal, es una declaración.

¿Qué hace realmente?
Le indica al navegador que use el modo estándar moderno (HTML5) en lugar de modos antiguos o de compatibilidad.

Por qué importa:
Sin esto, el navegador puede interpretar tu código de forma inconsistente (lo que antes se llamaba quirks mode), y tu página puede verse diferente en cada navegador. -->
<html lang="en">
    <!-- Es el elemento raíz de todo el documento. Todo lo que escribas debe ir dentro de esta etiqueta.

lang="en"

Es un atributo que define el idioma del contenido.

¿Para qué sirve realmente?

Mejora la accesibilidad (lectores de pantalla)
Ayuda a motores de búsqueda (SEO)
Permite traducciones automáticas más precisas -->
<head> <!--Contiene metadatos, es decir, información sobre la página que no se muestra directamente. -->
    <meta charset="UTF-8"> <!-- Define la codificación de caracteres.-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Esto es clave para diseño responsive. -->
    <title>Document</title> <!-- Define el título de la página. -->
</head>
<body>
    <!-- Este es el “cuerpo” de la web.

Puedes poner:

Texto → <p>
Títulos → <h1> a <h6>
Imágenes → <img>
Botones → <button>
Enlaces → <a> -->

<a href="/practica7.html">Volver</a>

</body> <!-- Cierra el contenido visible -->
</html> <!-- Cierra todo el documento html -->
