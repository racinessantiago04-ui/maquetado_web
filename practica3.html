<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Teoría: Títulos en HTML</title>
</head>
<body>

<!-- ===================================================== -->
<!-- 📚 TEORÍA: TÍTULOS O ENCABEZADOS EN HTML -->
<!-- ===================================================== -->

<!-- En HTML existen 6 niveles de títulos, desde <h1> hasta <h6> -->

<!-- 🔢 JERARQUÍA DE IMPORTANCIA -->
<!-- <h1> es el título más importante (principal de la página) -->
<!-- <h2> es un subtítulo -->
<!-- <h3> es un subtema dentro del <h2> -->
<!-- <h4>, <h5> y <h6> son niveles cada vez menos importantes -->

<!-- Ejemplo visual de jerarquía -->
<h1>Título principal</h1>
<h2>Subtítulo</h2>
<h3>Sub-subtítulo</h3>
<h4>Nivel 4</h4>
<h5>Nivel 5</h5>
<h6>Nivel 6</h6>

<!-- ===================================================== -->
<!-- 🧠 ¿PARA QUÉ SIRVEN LOS TÍTULOS? -->
<!-- ===================================================== -->

<!-- 1. Organizan el contenido de la página -->
<!-- 2. Mejoran la accesibilidad (lectores de pantalla) -->
<!-- 3. Ayudan al SEO (Google entiende mejor la estructura) -->

<!-- ===================================================== -->
<!-- ⚠️ BUENAS PRÁCTICAS -->
<!-- ===================================================== -->

<!-- ✔ Usar SOLO un <h1> por página -->
<!-- ✔ Mantener el orden (no saltar de h1 a h4 sin sentido) -->
<!-- ✔ No usar títulos solo para agrandar texto (usar CSS para eso) -->

<!-- ===================================================== -->
<!-- 🧾 EJEMPLO CORRECTO DE ESTRUCTURA -->
<!-- ===================================================== -->

<h1>Mi página web</h1>
<h2>Sección 1</h2>
<h3>Subsección 1.1</h3>
<h2>Sección 2</h2>

<!-- ===================================================== -->
<!-- ✅ RESUMEN -->
<!-- ===================================================== -->

<!-- Los <h1> a <h6> definen la estructura del contenido -->
<!-- No solo cambian el tamaño, también tienen significado semántico -->

</body>
</html>
